name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  actions: read

jobs:
  deploy-acceptance:
    name: Deploy to Acceptance
    runs-on: ubuntu-latest
    environment: acceptance
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: appointmentscheduling-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifact

      - name: Copy omod to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./artifact/*.omod"
          target: "/opt/appointment-audit/appointmentscheduling.omod"
          strip_components: 2

      - name: Deploy acceptance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/appointment-audit/deploy.sh acc

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-acceptance
    environment: production

    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@v4
        with:
          name: appointmentscheduling-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifact

      - name: Copy omod to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./artifact/*.omod"
          target: "/opt/appointment-audit/appointmentscheduling.omod"
          strip_components: 2

      - name: Deploy production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/appointment-audit/deploy.sh prod