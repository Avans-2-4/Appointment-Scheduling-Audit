name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

jobs:
  deploy-acceptance:
    name: Deploy to Acceptance
    runs-on: ubuntu-latest
    environment: acceptance
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      actions: read

    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: appointmentscheduling-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifact

      - name: Copy omod to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./artifact/*.omod"
          target: "/opt/appointment-audit/appointmentscheduling.omod"
          strip_components: 2

      - name: Deploy acceptance
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/appointment-audit/deploy.sh acc

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-acceptance
    environment: production

    permissions:
      contents: read
      actions: read

    steps:
      - name: Download omod artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: appointmentscheduling-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifact

      - name: Copy omod to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./artifact/*.omod"
          target: "/opt/appointment-audit/appointmentscheduling.omod"
          strip_components: 2

      - name: Deploy production
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/appointment-audit/deploy.sh prod